<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Clock - Free Web Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
    .font-mono-custom {
      font-family: 'Share Tech Mono', monospace;
    }
    .glass {
      background: rgba(30, 41, 59, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .neon-glow {
      text-shadow: 0 0 10px rgba(20, 184, 166, 0.5), 0 0 20px rgba(20, 184, 166, 0.3);
    }
    .neon-glow-blue {
      text-shadow: 0 0 10px rgba(59, 130, 246, 0.5), 0 0 20px rgba(59, 130, 246, 0.3);
    }
    .neon-glow-rose {
      text-shadow: 0 0 10px rgba(244, 63, 94, 0.5), 0 0 20px rgba(244, 63, 94, 0.3);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden relative">
  <!-- 背景グラデーション球 -->
  <div class="absolute w-[500px] h-[500px] rounded-full bg-teal-500/10 blur-[120px] top-[-10%] left-[-10%] pointer-events-none"></div>
  <div class="absolute w-[600px] h-[600px] rounded-full bg-blue-600/10 blur-[130px] bottom-[-20%] right-[-10%] pointer-events-none"></div>

  <div id="app" v-cloak class="w-full max-w-2xl z-10">
    <!-- Premium Language Toggle Button -->
    <button @click="toggleLang" class="absolute top-6 right-6 z-50 glass px-4 py-1.5 rounded-full text-xs font-semibold tracking-widest text-slate-300 hover:text-white hover:bg-slate-800/50 transition-all duration-300 border border-slate-700/50">
      [[ currentLang === 'en' ? 'EN / ja' : 'en / JA' ]]
    </button>
    <div class="glass rounded-3xl p-8 sm:p-12 shadow-2xl flex flex-col items-center relative overflow-hidden">
      <!-- 装飾用のミニマルヘッダー -->
      <div class="w-full flex justify-between items-center mb-10 text-xs tracking-widest text-slate-500 font-semibold uppercase">
        <span>[[ t('tool_name') ]]</span>
        <div class="flex gap-3">
          <button @click="setTheme('teal')" class="w-3.5 h-3.5 rounded-full bg-teal-400 border border-transparent hover:scale-110 transition" :class="{'border-white': theme === 'teal'}"></button>
          <button @click="setTheme('blue')" class="w-3.5 h-3.5 rounded-full bg-blue-500 border border-transparent hover:scale-110 transition" :class="{'border-white': theme === 'blue'}"></button>
          <button @click="setTheme('rose')" class="w-3.5 h-3.5 rounded-full bg-rose-500 border border-transparent hover:scale-110 transition" :class="{'border-white': theme === 'rose'}"></button>
        </div>
      </div>

      <!-- メインの時計表示 -->
      <div class="flex flex-col items-center select-none">
        <!-- 日付 -->
        <div class="text-sm sm:text-base font-semibold tracking-[0.25em] text-slate-400 uppercase mb-3">
          [[ dateString ]]
        </div>

        <!-- デジタル時間 -->
        <div class="text-6xl sm:text-8xl font-black font-mono-custom tracking-wider tabular-nums leading-none transition duration-300"
             :class="themeGlowClass">
          [[ timeString ]]
        </div>

        <!-- AM/PM & 秒 -->
        <div class="flex items-center gap-3 mt-4">
          <span class="text-xs sm:text-sm font-bold tracking-[0.3em] uppercase px-3 py-1 bg-slate-900/80 rounded-md border border-slate-800 text-slate-400">
            [[ period ]]
          </span>
          <span class="text-lg sm:text-xl font-bold font-mono-custom tabular-nums text-slate-500">
            : [[ seconds ]]
          </span>
        </div>
      </div>

      <!-- 装飾用のアナログ風プログレス (秒の進行状況) -->
      <div class="w-full bg-slate-900/50 h-1 mt-10 rounded-full overflow-hidden border border-slate-900/50">
        <div class="h-full bg-gradient-to-r transition-all duration-100 ease-linear"
             :class="themeBarClass"
             :style="{ width: progressPercent + '%' }"></div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const { createApp, ref, computed, onMounted, onUnmounted, watchEffect } = Vue;

      createApp({
        compilerOptions: { delimiters: ['[[', ']]'] },
        setup() {
          const now = ref(new Date());
          const theme = ref('teal');
          let timer = null;

          // i18n
          const currentLang = ref('en');
          const translations = ref({});

          const loadLang = () => {
            const saved = localStorage.getItem('preferred-lang');
            if (saved) {
              currentLang.value = saved;
            } else if (navigator.language && navigator.language.startsWith('ja')) {
              currentLang.value = 'ja';
            } else {
              currentLang.value = 'en';
            }
          };

          const t = (key) => {
            if (!translations.value || !translations.value[currentLang.value]) return key;
            return translations.value[currentLang.value][key] || key;
          };

          const toggleLang = () => {
            currentLang.value = currentLang.value === 'en' ? 'ja' : 'en';
            localStorage.setItem('preferred-lang', currentLang.value);
          };

          const updateTime = () => {
            now.value = new Date();
          };

          onMounted(async () => {
            loadLang();
            try {
              const res = await fetch('./i18n.json');
              const data = await res.json();
              translations.value = data;
            } catch (e) {
              console.error('Failed to load i18n.json', e);
            }
            timer = setInterval(updateTime, 250);
          });

          watchEffect(() => {
            if (translations.value && translations.value[currentLang.value]) {
              document.title = t('page_title');
              document.documentElement.lang = currentLang.value;
            }
          });

          onUnmounted(() => {
            if (timer) clearInterval(timer);
          });

          const timeString = computed(() => {
            const h = String(now.value.getHours()).padStart(2, '0');
            const m = String(now.value.getMinutes()).padStart(2, '0');
            return `${h}:${m}`;
          });

          const seconds = computed(() => {
            return String(now.value.getSeconds()).padStart(2, '0');
          });

          const period = computed(() => {
            return now.value.getHours() >= 12 ? t('pm') : t('am');
          });

          const dateString = computed(() => {
            const y = now.value.getFullYear();
            const m = String(now.value.getMonth() + 1).padStart(2, '0');
            const d = String(now.value.getDate()).padStart(2, '0');
            
            const daysKeys = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
            const dayName = t(daysKeys[now.value.getDay()]);
            
            return `${y}-${m}-${d} // ${dayName}`;
          });

          const progressPercent = computed(() => {
            const sec = now.value.getSeconds();
            const ms = now.value.getMilliseconds();
            return ((sec + ms / 1000) / 60) * 100;
          });

          const setTheme = (color) => {
            theme.value = color;
          };

          const themeGlowClass = computed(() => {
            if (theme.value === 'blue') return 'text-blue-500 neon-glow-blue';
            if (theme.value === 'rose') return 'text-rose-500 neon-glow-rose';
            return 'text-teal-400 neon-glow';
          });

          const themeBarClass = computed(() => {
            if (theme.value === 'blue') return 'from-blue-600 to-indigo-500 shadow-[0_0_10px_rgba(59,130,246,0.5)]';
            if (theme.value === 'rose') return 'from-rose-600 to-pink-500 shadow-[0_0_10px_rgba(244,63,94,0.5)]';
            return 'from-teal-500 to-emerald-400 shadow-[0_0_10px_rgba(20,184,166,0.5)]';
          });

          return {
            t,
            currentLang,
            toggleLang,
            timeString,
            seconds,
            period,
            dateString,
            progressPercent,
            theme,
            setTheme,
            themeGlowClass,
            themeBarClass
          };
        }
      }).mount('#app');
    })();
  </script>
</body>
</html>
