<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Clock - Free Web Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  
  <script type="module">
  import SettingsModal from '../../static/js/settings_modal.js';
  import BackgroundModal from '../../static/js/background_modal.js';
  import { usePortalCommon } from '../../static/js/portal_common.js';

    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            neonBlue: '#00f0ff',
            neonGreen: '#39ff14',
            neonPurple: '#d300ff',
            neonRed: '#ff073a',
            slateDark: '#0b0f19'
          }
        }
      }
    }
  </script>
  
  <link rel="stylesheet" href="../../static/css/portal.css">
  <style>

    .font-mono-custom {
      font-family: 'Share Tech Mono', monospace;
    }

  </style>
</head>
<body class="min-h-screen relative overflow-hidden flex flex-col justify-between" id="theme-root">

  <div id="app" v-cloak class="min-h-screen w-full flex flex-col justify-between relative z-10">
    
    <!-- Dynamic Background Image Layer -->
    <div class="absolute inset-0 pointer-events-none transition-all duration-500 z-0 bg-cover bg-center"
         :style="{ 
           backgroundImage: settings.bgUrl ? 'url(' + settings.bgUrl + ')' : 'none',
           opacity: settings.bgOpacity,
           filter: 'blur(' + settings.bgBlur + 'px)'
         }">
    </div>

    <!-- Header Navigation -->
    <header class="relative z-10 w-full px-6 py-4 flex justify-between items-center glass-panel border-b">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-purple-600 flex items-center justify-center text-[var(--text-main)] text-xl font-bold shadow-md shadow-cyan-500/20">
          <i class="fa-solid fa-clock"></i>
        </div>
        <div>
          <h1 class="text-lg font-black tracking-wider uppercase bg-gradient-to-r from-cyan-400 to-purple-400 bg-clip-text text-transparent">
            [[ t('tool_title') ]]
          </h1>
          <span class="text-[9px] font-bold text-[var(--text-muted)] font-mono tracking-widest">// STANDALONE TOOL</span>
        </div>
      </div>
      
      <!-- Top Action Controls -->
      <div class="flex items-center gap-3">
        <!-- Settings Gear Toggle Button -->
        <button @click="isSettingsOpen = true" 
                class="w-10 h-10 rounded-xl flex items-center justify-center border border-[var(--border-color)] bg-[var(--bg-card)] text-[var(--text-muted)] hover:text-[var(--text-main)] hover:border-cyan-500/40 transition duration-300">
          <i class="fa-solid fa-gear animate-spin-slow"></i>
        </button>
      </div>
    </header>

    <!-- Main Workspace Container -->
    <main class="relative z-10 w-full max-w-4xl mx-auto flex-grow flex flex-col items-center justify-center px-6 py-12">
      <!-- Clock Main Panel -->
      <div class="w-full glass-panel p-8 sm:p-12 rounded-3xl neon-shadow flex flex-col items-center relative overflow-hidden max-w-2xl">
        <!-- Minimal Decor Header -->
        <div class="w-full flex justify-between items-center mb-10 text-[10px] tracking-widest text-[var(--text-muted)] font-semibold uppercase">
          <span>[[ t('tool_name') ]]</span>
          <span class="font-mono">// LIVE STATE</span>
        </div>

        <!-- Clock Face -->
        <div class="flex flex-col items-center select-none">
          <!-- Date -->
          <div class="text-sm sm:text-base font-semibold tracking-[0.25em] text-[var(--text-muted)] uppercase mb-3">
            [[ dateString ]]
          </div>
          <!-- Digital Time -->
          <div class="text-6xl sm:text-8xl font-black font-mono-custom tracking-wider tabular-nums leading-none transition duration-300"
               :style="{ color: 'var(--accent-color)', textShadow: 'var(--accent-glow-intensity)' }">
            [[ timeString ]]
          </div>
          <!-- AM/PM & Seconds -->
          <div class="flex items-center gap-3 mt-4">
            <span class="text-xs sm:text-sm font-bold tracking-[0.3em] uppercase px-3 py-1 bg-[var(--bg-card)] rounded-md border border-[var(--border-color)] text-[var(--text-muted)]">
              [[ period ]]
            </span>
            <span class="text-lg sm:text-xl font-bold font-mono-custom tabular-nums text-[var(--text-muted)]">
              : [[ seconds ]]
            </span>
          </div>
        </div>

        <!-- Progress Indicator -->
        <div class="w-full bg-[var(--bg-card)] h-1.5 mt-10 rounded-full overflow-hidden border border-slate-900/50">
          <div class="h-full bg-[var(--accent-color)] transition-all duration-100 ease-linear shadow-[0_0_10px_var(--accent-color)]"
               :style="{ width: progressPercent + '%' }"></div>
        </div>
      </div>
    </main>

    <!-- Footer Controls -->
    <footer class="relative z-10 w-full px-6 py-4 flex justify-between items-center glass-panel border-t text-xs" style="color: var(--text-muted);">
      <div>&copy; 2026 Free Web Tools Project.</div>
      <div class="flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
        <span class="font-mono uppercase text-[10px]">Active Node</span>
      </div>
    </footer>

    <!-- Settings Modal Component -->
    <!-- Settings Modal Component -->
    <settings-modal 
      :settings="settings" 
      :translations="translations" 
      :is-open="isSettingsOpen" 
      @close="isSettingsOpen = false"
      @reset="resetToDefault"
      @open-bg-modal="isBgModalOpen = true"
    ></settings-modal>

    <!-- Background Modal Component -->
    <background-modal 
      :settings="settings" 
      :translations="translations" 
      :is-open="isBgModalOpen" 
      @close="isBgModalOpen = false"
    ></background-modal>
<script type="module">
  import SettingsModal from '../../static/js/settings_modal.js';
  import BackgroundModal from '../../static/js/background_modal.js';
  import { usePortalCommon } from '../../static/js/portal_common.js';

    (() => {
      const { createApp, ref, reactive, computed, onMounted, onUnmounted, watch, nextTick } = Vue;

      const DEFAULT_SETTINGS = {
        lang: 'en',
        theme: 'dark',
        bgUrl: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop',
        bgOpacity: 0.15,
        bgBlur: 8,
        custom: {}
      };

      createApp({
        components: { SettingsModal, BackgroundModal },
        compilerOptions: { delimiters: ['[[', ']]'] },
        setup() {
          const translations = ref({});
          const portal = usePortalCommon(translations, (typeof DEFAULT_SETTINGS !== 'undefined' && DEFAULT_SETTINGS.custom) || {});
          const { settings, showSettings: isSettingsOpen, isBgModalOpen, isFullscreen, t, toggleFullscreen } = portal;

          // Clock specific variables
          const now = ref(new Date());
          let timer = null;

          const loadTranslations = async () => {
            try {
              const res = await fetch('./i18n.json');
              translations.value = await res.json();
              updateDocumentMetadata();
            } catch (e) {
              console.error("Failed to load local translations", e);
            }
          };

          const updateDocumentMetadata = () => {
            document.title = t('page_title');
            document.documentElement.lang = settings.lang;
          };

          const closeSettings = () => {
            isSettingsOpen.value = false;
          };

          const resetToDefault = () => {
            portal.resetSettings();
            updateDocumentMetadata();
          };

          const setTheme = (themeName) => {
            settings.theme = themeName;
          };

          const setLang = (langCode) => {
            settings.lang = langCode;
          };
// Clock specific functions
          const updateTime = () => {
            now.value = new Date();
          };

          const timeString = computed(() => {
            const h = String(now.value.getHours()).padStart(2, '0');
            const m = String(now.value.getMinutes()).padStart(2, '0');
            return `${h}:${m}`;
          });

          const seconds = computed(() => {
            return String(now.value.getSeconds()).padStart(2, '0');
          });

          const period = computed(() => {
            return now.value.getHours() >= 12 ? t('pm') : t('am');
          });

          const dateString = computed(() => {
            const y = now.value.getFullYear();
            const m = String(now.value.getMonth() + 1).padStart(2, '0');
            const d = String(now.value.getDate()).padStart(2, '0');
            
            const daysKeys = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
            const dayName = t(daysKeys[now.value.getDay()]);
            
            return `${y}-${m}-${d} // ${dayName}`;
          });

          const progressPercent = computed(() => {
            const sec = now.value.getSeconds();
            const ms = now.value.getMilliseconds();
            return ((sec + ms / 1000) / 60) * 100;
          });

          // Watch lang changes to reactively update document details
          watch(() => settings.lang, () => {
            updateDocumentMetadata();
          });

          onMounted(() => {
            loadTranslations();
            
            timer = setInterval(updateTime, 250);
          });

          onUnmounted(() => {
            if (timer) clearInterval(timer);
          });

          return {
            isSettingsOpen,
            isBgModalOpen,
            isFullscreen,
            settings,
            t,
            setTheme,
            setLang,
            closeSettings,
            resetToDefault,
            toggleFullscreen,
            timeString,
            seconds,
            period,
            dateString,
            progressPercent
          };
        }
      }).mount('#app');
    })();
  </script>
</body>
</html>
